name: Build Latest Rclone Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - Dockerfile
      - rootfs/**
      - .github/workflows/build-latest-rclone.yml
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-latest-rclone-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve latest rclone release
        id: rclone
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 - <<'PY'
          import json
          import urllib.request

          request = urllib.request.Request(
              "https://api.github.com/repos/rclone/rclone/releases/latest",
              headers={"Accept": "application/vnd.github+json"},
          )
          with urllib.request.urlopen(request) as response:
              release = json.load(response)

          print(release["tag_name"])
          PY
          )"

          if [ -z "${version}" ]; then
            echo "Unable to resolve latest rclone release" >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Latest rclone release: ${version}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.rclone.outputs.version }}
          labels: |
            org.opencontainers.image.title=rclone-mount
            org.opencontainers.image.description=Rclone mount container built from the latest upstream rclone release
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.rclone.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            IMAGE_VERSION=${{ steps.rclone.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write workflow summary
        shell: bash
        run: |
          {
            echo "### Published image"
            echo
            echo "- Image: \`${{ steps.image.outputs.name }}\`"
            echo "- Rclone version: \`${{ steps.rclone.outputs.version }}\`"
            echo "- Tags: \`latest\`, \`${{ steps.rclone.outputs.version }}\`"
            echo "- Platform: \`linux/amd64\`"
          } >> "$GITHUB_STEP_SUMMARY"
